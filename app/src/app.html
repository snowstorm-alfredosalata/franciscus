<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Icons / favicons -->
		<link rel="icon" href="/favicon.ico" sizes="48x48" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
		<link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#070e1d" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Franciscus" />
		<meta name="mobile-web-app-capable" content="yes" />

		<!-- Primary SEO -->
		<title>Franciscus — Franciscan Sources</title>
		<meta
			name="description"
			content="A digital portal to the Franciscan sources: the medieval Latin lives of Saint Francis of Assisi, with translations, annotations, cross-references, and full-text search."
		/>
		<meta name="author" content="Alfredo Salata" />
		<meta
			name="keywords"
			content="Franciscan sources, Francis of Assisi, Fonti Francescane, medieval Latin, Celano, Bonaventure, hagiography, Latin texts, translations"
		/>
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://franciscus.app/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Franciscus" />
		<meta property="og:title" content="Franciscus — Franciscan Sources" />
		<meta
			property="og:description"
			content="A digital portal to the Franciscan sources: the medieval Latin lives of Saint Francis of Assisi, with translations, annotations, cross-references, and full-text search."
		/>
		<meta property="og:url" content="https://franciscus.app/" />
		<meta property="og:image" content="https://franciscus.app/franciscus-splash.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Franciscus — the Franciscan sources" />
		<meta property="og:locale" content="en" />
		<meta property="og:locale:alternate" content="it" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Franciscus — Franciscan Sources" />
		<meta
			name="twitter:description"
			content="A digital portal to the Franciscan sources: the medieval Latin lives of Saint Francis of Assisi, with translations, annotations, and full-text search."
		/>
		<meta name="twitter:image" content="https://franciscus.app/franciscus-splash.png" />
		<meta name="twitter:image:alt" content="Franciscus — the Franciscan sources" />
		<script>
			(function() {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
					document.documentElement.classList.add('dark');
				var lang = localStorage.getItem('franciscus-ui-lang');
				if (lang) document.documentElement.lang = lang;
				var scale = localStorage.getItem('franciscus-reader-scale');
				if (scale) document.documentElement.style.setProperty('--reader-scale', scale);
			})();
		</script>
		<!-- With JavaScript disabled, the live app never boots, so hide the
		     client-only loading indicators (a stuck bar/spinner would mislead);
		     the prerendered NoScriptNotice explains instead. Links that need the
		     in-browser database are disabled inline (they render in their
		     DB-not-ready state, which is what a no-JS client is permanently in). -->
		<noscript>
			<style>
				.js-only {
					display: none !important;
				}
			</style>
		</noscript>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
