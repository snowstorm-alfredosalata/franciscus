<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#070e1d" />
		<title>Franciscus</title>
		<script>
			(function() {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
					document.documentElement.classList.add('dark');
				var lang = localStorage.getItem('franciscus-ui-lang');
				if (lang) document.documentElement.lang = lang;
				var scale = localStorage.getItem('franciscus-reader-scale');
				if (scale) document.documentElement.style.setProperty('--reader-scale', scale);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
